<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>samsoftwareapp</title>
  <style>
    :root {
      --bg: #eef2ff;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --border: #d1d5db;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, var(--bg) 0%, #f8fafc 45%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: grid;
      place-items: center;
    }

    .container {
      width: 100%;
      max-width: 780px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.07);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      color: #111827;
      line-height: 1.2;
    }

    p {
      color: var(--muted);
      margin-top: 10px;
    }

    .menu {
      margin-top: 24px;
      display: grid;
      gap: 12px;
    }

    .menu a {
      display: block;
      text-decoration: none;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: #111827;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .menu a:hover {
      border-color: var(--accent);
      color: var(--accent-dark);
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 18px;
      font-size: 0.95rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>samsoftwareapp</h1>
    <p>Halaman ini adalah menu awal. Pilih halaman yang ingin dibuka.</p>

    <nav class="menu">
      <a href="kebijakan-privasi.html">Kebijakan Privasi</a>
    </nav>

    <p class="hint">Tambahkan link menu lain di sini jika nanti ada halaman tambahan.</p>
  </main>
</body>
</html>
